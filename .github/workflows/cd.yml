name: CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"

jobs:
  deploy:
    name: Build & Deploy Backend
    if: github.repository == 'haxxru/Wedge'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build JAR (skip tests)
        working-directory: backend
        run: ./gradlew bootJar --no-daemon -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wedge-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wedge-backend:${{ github.sha }}

      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd ~/wedge
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/wedge-backend:latest
            docker compose -f docker-compose.prod.yml down backend
            docker compose -f docker-compose.prod.yml up -d backend
            docker image prune -f

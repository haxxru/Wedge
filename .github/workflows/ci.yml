name: CI

on:
  push:
    branches: [dev]
    paths:
      - "backend/**"
  pull_request:
    branches: [dev, main]
    paths:
      - "backend/**"

jobs:
  backend-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test1234
          MYSQL_DATABASE: wedge
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build & Test
        env:
          DB_URL: jdbc:mysql://localhost:3306/wedge?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
          DB_USERNAME: root
          DB_PASSWORD: test1234
          JWT_SECRET: ci-test-jwt-secret-key-that-is-long-enough-for-384-bit-hmac-signing
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          KAKAO_CLIENT_ID: ci-test-kakao-id
          KAKAO_CLIENT_SECRET: ci-test-kakao-secret
          GOOGLE_CLIENT_ID: ci-test-google-id
          GOOGLE_CLIENT_SECRET: ci-test-google-secret
          OPENAI_API_KEY: ci-test-openai-key
          R2_ENDPOINT: https://test.r2.cloudflarestorage.com
          R2_BUCKET: test-bucket
          R2_ACCESS_KEY: ci-test-r2-access
          R2_SECRET_KEY: ci-test-r2-secret
          FRONTEND_URL: http://localhost:3000
        run: ./gradlew build --no-daemon
